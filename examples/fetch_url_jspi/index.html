<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>fetch_url JSPI Example</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f3efe6;
        --panel: #fffaf1;
        --ink: #1f2a30;
        --accent: #0e7490;
        --border: #d7ccb8;
      }

      body {
        margin: 0;
        font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at top left, rgba(14, 116, 144, 0.12), transparent 32%),
          linear-gradient(180deg, #f8f4ea 0%, var(--bg) 100%);
        color: var(--ink);
      }

      main {
        max-width: 860px;
        margin: 0 auto;
        padding: 32px 20px 48px;
      }

      .panel {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 20px;
        box-shadow: 0 16px 40px rgba(31, 42, 48, 0.08);
      }

      h1 {
        margin: 0 0 8px;
        font-size: clamp(2rem, 4vw, 3.25rem);
        line-height: 0.95;
        letter-spacing: -0.04em;
      }

      p {
        margin: 0 0 16px;
        max-width: 60ch;
      }

      button {
        appearance: none;
        border: 0;
        border-radius: 999px;
        background: var(--accent);
        color: white;
        font: inherit;
        padding: 11px 18px;
        cursor: pointer;
      }

      button:disabled {
        cursor: wait;
        opacity: 0.7;
      }

      #status {
        margin: 16px 0;
        font-weight: 600;
      }

      pre {
        margin: 0;
        min-height: 280px;
        padding: 16px;
        overflow: auto;
        border-radius: 12px;
        background: #172026;
        color: #d5e9ef;
        font-family: "IBM Plex Mono", "SFMono-Regular", monospace;
        font-size: 14px;
        line-height: 1.45;
      }
    </style>
  </head>
  <body>
    <main>
      <section class="panel">
        <h1>fetch_url wasm example</h1>
        <p>
          This page fetches <code>sample.txt</code> from inside wasm. In the polling build,
          JS has to drive completion. In the JSPI build, wasm suspends in the fetch call and
          resumes with sync-like control flow.
        </p>
        <button id="run" type="button">Run Fetch</button>
        <div id="status">phase=idle status=0 size=0</div>
        <pre id="log"></pre>
      </section>
    </main>
    <script type="module" src="./app.js"></script>
  </body>
</html>
